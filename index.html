<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>هفال فون - Haval Phone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        :root { --bg: #000; --card: #161616; --gold: #ffb703; --green: #2ecc71; --border: #333; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; }
        
        /* تصميم الشريط العلوي */
        .header { text-align: center; font-size: 24px; font-weight: bold; color: var(--gold); margin-bottom: 20px; }
        .input-box { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        .btn-add { background: var(--green); width: 100%; padding: 14px; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-add:hover { background: #27ae60; }

        /* تصميم الأيقونات */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .menu-btn { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { border-color: var(--gold); transform: translateY(-5px); }
        .menu-btn i { font-size: 28px; color: var(--gold); margin-bottom: 10px; }
        .menu-btn div { font-weight: bold; }

        /* النافذة المنبثقة */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); padding: 20px; z-index: 100; }
        .modal-content { max-width: 450px; margin: auto; background: var(--card); padding: 20px; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">✨ هفال فون ✨</div>
        
        <div class="input-box">
            <input type="text" id="customer" placeholder="اسم الزبون...">
            <input type="text" id="item" placeholder="اسم المادة...">
            <select id="type">
                <option value="دائن">دائن</option>
                <option value="مدين">مدين</option>
                <option value="شاشات">شاشات</option>
                <option value="تطابق">تطابق</option>
            </select>
            <input type="number" id="amount" placeholder="المبلغ (د.ع)...">
            <button class="btn-add" onclick="addTransaction()">إضافة المعاملة</button>
        </div>

        <div class="menu-grid">
            <div class="menu-btn" onclick="showDetails('دائن')"><i class="fa-solid fa-users"></i><div>سجل الدائن</div></div>
            <div class="menu-btn" onclick="showDetails('مدين')"><i class="fa-solid fa-file-invoice"></i><div>سجل المدين</div></div>
            <div class="menu-btn" onclick="showDetails('شاشات')"><i class="fa-solid fa-tv"></i><div>شاشات</div></div>
            <div class="menu-btn" onclick="showDetails('تطابق')"><i class="fa-solid fa-code-compare"></i><div>تطابق</div></div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="modal-title" style="color:var(--gold)"></h2>
                <button onclick="document.getElementById('modal').style.display='none'" style="background:transparent; border:none; color:white; font-size:20px; cursor:pointer;">✕</button>
            </div>
            <div id="modal-list"></div>
        </div>
    </div>

    <script>
        function addTransaction() {
            let data = {
                customer: document.getElementById('customer').value,
                item: document.getElementById('item').value,
                amount: document.getElementById('amount').value,
                type: document.getElementById('type').value
            };
            if (!data.customer || !data.amount) return alert("يرجى ملء الحقول المطلوبة");
            
            let list = JSON.parse(localStorage.getItem(data.type)) || [];
            list.push(data);
            localStorage.setItem(data.type, JSON.stringify(list));
            
            alert("تمت الإضافة بنجاح!");
            document.getElementById('customer').value = '';
            document.getElementById('item').value = '';
            document.getElementById('amount').value = '';
        }

        function showDetails(type) {
            let list = JSON.parse(localStorage.getItem(type)) || [];
            let html = "<table><tr><th>الزبون</th><th>المادة</th><th>المبلغ</th></tr>";
            list.forEach(i => {
                html += `<tr><td>${i.customer}</td><td>${i.item}</td><td>${i.amount}</td></tr>`;
            });
            html += "</table>";
            document.getElementById('modal-title').innerText = "سجل " + type;
            document.getElementById('modal-list').innerHTML = html;
            document.getElementById('modal').style.display = 'block';
        }
    </script>
</body>
</html>
