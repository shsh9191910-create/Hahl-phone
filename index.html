<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>هفال فون - نظام متكامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #f4f4f4; --card: #ffffff; --text: #000; --accent: #2ecc71; }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; transition: 0.3s; }
        .container { max-width: 400px; margin: auto; }
        .hidden { display: none; }
        .btn { padding: 8px; border-radius: 6px; border: none; cursor: pointer; margin: 2px; font-weight: bold; color: white; }
        .btn-add { background: var(--accent); width: 100%; padding: 10px; }
        .card { background: var(--card); padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #ccc; font-size: 14px; }
        input { width: 100%; padding: 8px; margin-bottom: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        #apple-card { background: white; color: black; padding: 15px; border-radius: 10px; border: 2px solid #007bff; display: none; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn" style="background:#555" onclick="toggleTheme()">☀️/🌙</button>
    <button class="btn" style="background:#333" onclick="setLang('ar')">العربية</button>
    <button class="btn" style="background:#333" onclick="setLang('ku')">Kurdî</button>
    
    <div id="login-screen">
        <h2 id="l-title">دخول هفال فون</h2>
        <input type="text" id="userInput" placeholder="اسم المستخدم">
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button class="btn btn-add" id="btn-login" onclick="checkLogin()">دخول</button>
    </div>

    <div id="app-content" class="hidden">
        <div id="main-menu">
            <h2 id="m-title" style="text-align:center;">هفال فون</h2>
            <div id="menu-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <div class="card" onclick="openSection('مدين')">مدين</div>
                <div class="card" onclick="openSection('دائن')">دائن</div>
                <div class="card" onclick="openSection('شاشات')">شاشات</div>
                <div class="card" onclick="openSection('طلبات')">طلبات</div>
                <div class="card" onclick="openSection('ابل ايدي')" style="grid-column: span 2;">🍎 Apple ID</div>
                <div class="card" onclick="openSection('اعدادات')" style="grid-column: span 2; background:#555;">⚙️ الإعدادات</div>
            </div>
        </div>

        <div id="page-section" class="hidden">
            <button class="btn" style="background:#777" id="btn-back" onclick="goBack()">⬅ رجوع</button>
            <h2 id="section-title"></h2>
            
            <div id="settings-area" class="hidden">
                <input type="text" id="new-user" placeholder="مستخدم جديد">
                <input type="password" id="new-pass" placeholder="كلمة مرور جديدة">
                <button class="btn btn-add" id="btn-save" onclick="saveSettings()">حفظ</button>
            </div>

            <div id="data-inputs">
                <input type="text" id="i-name" placeholder="الاسم">
                <input type="text" id="i-item" placeholder="المادة">
                <input type="number" id="i-qty" placeholder="العدد">
                <input type="number" id="i-price" placeholder="المبلغ">
                <button class="btn btn-add" id="btn-add-rec" onclick="saveRecord()">إضافة سجل</button>
            </div>
            <div id="record-list"></div>
        </div>
    </div>
</div>

<script>
    const langDict = {
        ar: { title: "دخول هفال فون", login: "دخول", menu: "هفال فون", back: "رجوع", save: "حفظ", add: "إضافة سجل", user: "اسم المستخدم", pass: "كلمة المرور", mdn: "مدين", dan: "دائن", scr: "شاشات", req: "طلبات", sett: "الإعدادات" },
        ku: { title: "چوونەژوورەوەی هفال فون", login: "چوونەژوورەوە", menu: "هفال فون", back: "گەڕانەوە", save: "پاشەکەوت", add: "زیادکردنی تۆمار", user: "ناوی بەکارهێنەر", pass: "وشەی نهێنی", mdn: "قەرزدار", dan: "قەرزار", scr: "شاشەکان", req: "داواکارییەکان", sett: "ڕێکخستنەکان" }
    };

    function setLang(lang) {
        document.getElementById('html-root').dir = (lang === 'ku') ? 'ltr' : 'rtl';
        document.getElementById('l-title').innerText = langDict[lang].title;
        document.getElementById('btn-login').innerText = langDict[lang].login;
        document.getElementById('m-title').innerText = langDict[lang].menu;
        document.getElementById('btn-back').innerText = langDict[lang].back;
        document.getElementById('btn-save').innerText = langDict[lang].save;
        document.getElementById('btn-add-rec').innerText = langDict[lang].add;
        document.getElementById('userInput').placeholder = langDict[lang].user;
        document.getElementById('passInput').placeholder = langDict[lang].pass;
        
        // تحديث أسماء الأقسام في القائمة
        const cards = document.querySelectorAll('#menu-grid .card');
        cards[0].innerText = langDict[lang].mdn;
        cards[1].innerText = langDict[lang].dan;
        cards[2].innerText = langDict[lang].scr;
        cards[3].innerText = langDict[lang].req;
        cards[5].innerText = "⚙️ " + langDict[lang].sett;
    }

    // بقية كودك الأصلي كما هو...
    if(!localStorage.getItem('user')) { localStorage.setItem('user', 'admin'); localStorage.setItem('pass', '123'); }
    function checkLogin() { if(document.getElementById('userInput').value === localStorage.getItem('user') && document.getElementById('passInput').value === localStorage.getItem('pass')) { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); } else alert('خطأ!'); }
    function openSection(type) { activeType = type; document.getElementById('main-menu').classList.add('hidden'); document.getElementById('page-section').classList.remove('hidden'); document.getElementById('section-title').innerText = type; document.getElementById('settings-area').classList.toggle('hidden', type !== 'اعدادات'); document.getElementById('data-inputs').classList.toggle('hidden', (type === 'ابل ايدي' || type === 'اعدادات')); renderRecords(); }
    function goBack() { document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('page-section').classList.add('hidden'); }
    function saveRecord() { let key = "data_" + activeType; let data = JSON.parse(localStorage.getItem(key) || "[]"); data.push({ n: document.getElementById('i-name').value, it: document.getElementById('i-item').value, q: document.getElementById('i-qty').value, p: parseFloat(document.getElementById('i-price').value) || 0 }); localStorage.setItem(key, JSON.stringify(data)); renderRecords(); }
    function renderRecords() { let key = "data_" + activeType; let data = JSON.parse(localStorage.getItem(key) || "[]"); document.getElementById('record-list').innerHTML = data.map((d, i) => `<div class="card"><strong>${d.n}</strong> | ${d.it} | ${d.p} <button onclick="deleteRec(${i})">🗑️</button></div>`).join(''); }
    function deleteRec(i) { let key = "data_" + activeType; let data = JSON.parse(localStorage.getItem(key)); data.splice(i, 1); localStorage.setItem(key, JSON.stringify(data)); renderRecords(); }
    function toggleTheme() { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    function saveSettings() { localStorage.setItem('user', document.getElementById('new-user').value); localStorage.setItem('pass', document.getElementById('new-pass').value); alert('تم!'); }
</script>
</body>
</html>
