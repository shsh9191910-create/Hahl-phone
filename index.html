<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هفال فون - Haval Phone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

        :root {
            --bg-color: #000000;
            --card-bg: #1e1e1e;
            --text-gold: #ffb703;
            --text-secondary: #aaaaaa;
            --btn-green: #2ecc71;
            --accent-yellow: #f1c40f;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); margin: 0; color: #ffffff; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .app-header { text-align: center; font-size: 26px; font-weight: bold; color: var(--text-gold); margin-bottom: 5px; }
        .balance-section { display: flex; justify-content: center; gap: 20px; padding: 10px; border-bottom: 1px solid #333; }
        
        .input-container { background-color: var(--card-bg); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        .quick-filter-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .filter-btn { background-color: #2a2a2a; color: #aaaaaa; border: none; border-radius: 10px; padding: 8px 10px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .filter-btn.active { background-color: var(--accent-yellow); color: black; font-weight: bold; }
        
        input { width: 100%; padding: 12px; background-color: #2a2a2a; border: none; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        .btn-add { background-color: var(--btn-green); color: white; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-btn { background-color: var(--card-bg); border-radius: 16px; padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; border: 2px solid #333; transition: 0.3s; }
        .menu-icon { font-size: 22px; color: var(--text-gold); }
        .menu-title { font-size: 14px; font-weight: bold; }
        .menu-amount { font-size: 13px; color: var(--btn-green); }

        .total-card { background-color: var(--card-bg); border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; border: 1px solid #333; }
        .total-amount { color: var(--text-gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">✨ هفال فون ✨</div>
        <div class="balance-section">
            <div style="color: #aaaaaa;">مدين: <span style="color: #d63031;">٤٠,٠٠٠</span></div>
            <div style="color: var(--text-gold);">دائن: <span style="color: #f1c40f;">١,١٠٦,٧٥٠</span></div>
        </div>

        <div class="input-container">
            <div class="quick-filter-bar">
                <button class="filter-btn active">دائن</button>
                <button class="filter-btn">مدين</button>
                <button class="filter-btn">شاشات</button>
                <button class="filter-btn">تطابق</button>
                <button class="filter-btn">ابل ايدي</button>
            </div>
            
            <input type="text" placeholder="اسم الزبون...">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" placeholder="العدد">
                <input type="number" placeholder="السعر">
            </div>
            <button class="btn-add">إضافة المعاملة</button>
        </div>

        <div class="menu-grid">
            <div class="menu-btn">
                <i class="fa-solid fa-users menu-icon"></i>
                <div class="menu-title">سجل الدائن</div>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-file-invoice menu-icon"></i>
                <div class="menu-title">سجل المدين</div>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-screwdriver-wrench menu-icon"></i>
                <div class="menu-title">الصيانة</div>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-box menu-icon"></i>
                <div class="menu-title">المخزن</div>
            </div>
            <div class="menu-btn">
                <i class="fa-brands fa-apple menu-icon"></i>
                <div class="menu-title">Apple ID</div>
            </div>
            <div class="menu-btn">
                <i class="fa-solid fa-bell menu-icon"></i>
                <div class="menu-title">تنبيه الديون</div>
            </div>
        </div>

        <div class="total-card">
            <div>الوارد الكلي لهذا الشهر</div>
            <div class="total-amount">١١,٨٤٠,٠٠٠ د.ع</div>
        </div>
    </div>

</body>
</html>
