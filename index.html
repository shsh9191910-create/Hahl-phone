<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هفال فون ✨</title>
    <style>
        :root { --bg: #000; --card: #1a1a1a; --gold: #ffd700; --border: #333; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; padding: 15px; margin: 0; min-height: 100vh; }
        .app-container { max-width: 400px; margin: auto; }
        
        /* شريط اللغة */
        .lang-bar { display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 20px; }
        .lang-btn { background: #333; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        /* الأيقونات */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: var(--card); padding: 30px 10px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; font-weight: bold; }
        
        #section-page { display: none; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; }
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn-action { background: #2ecc71; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-bar">
        <div class="lang-btn" onclick="setLang('ar')">العربية</div>
        <div class="lang-btn" onclick="setLang('ku')">Kurdî</div>
    </div>

    <div id="main-menu">
        <h2 id="title-main" style="text-align: center; color: var(--gold);">✨ هفال فون ✨</h2>
        <div class="grid">
            <div class="menu-item" onclick="openPage('مدين')">🏢 <span class="txt-debt">مدين</span></div>
            <div class="menu-item" onclick="openPage('دائن')">👥 <span class="txt-cred">دائن</span></div>
            <div class="menu-item" onclick="openPage('شاشات')">📺 <span class="txt-screens">شاشات</span></div>
            <div class="menu-item" onclick="openPage('طلبات')">🛒 <span class="txt-orders">طلبات</span></div>
            <div class="menu-item" onclick="openPage('ابل ايدي')" style="grid-column: span 2;">🍎 Apple ID</div>
        </div>
    </div>

    <div id="section-page">
        <button onclick="goBack()" style="background:none; border:none; color:white; font-size:18px;">⬅ <span class="txt-back">رجوع</span></button>
        <h2 id="section-title" style="color:var(--gold); text-align:center;"></h2>
        <div id="fields"></div>
        <button class="btn-action" onclick="saveData()">+</button>
        <div id="record-list"></div>
    </div>
</div>

<script>
    const translations = {
        'ar': { debt: 'مدين', cred: 'دائن', screens: 'شاشات', orders: 'طلبات', back: 'رجوع' },
        'ku': { debt: 'قەرزدار', cred: 'قەرزپێدەر', screens: 'شاشە', orders: 'داواکاری', back: 'گەڕانەوە' }
    };

    function setLang(lang) {
        document.getElementById('html-root').setAttribute('dir', lang === 'ku' ? 'rtl' : 'rtl');
        document.querySelectorAll('.txt-debt').forEach(e => e.innerText = translations[lang].debt);
        document.querySelectorAll('.txt-cred').forEach(e => e.innerText = translations[lang].cred);
        document.querySelectorAll('.txt-screens').forEach(e => e.innerText = translations[lang].screens);
        document.querySelectorAll('.txt-orders').forEach(e => e.innerText = translations[lang].orders);
        document.querySelectorAll('.txt-back').forEach(e => e.innerText = translations[lang].back);
    }

    // المنطق السابق مع تحديث بسيط
    let activeType = "";
    function openPage(type) {
        activeType = type;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('section-page').style.display = 'block';
        document.getElementById('section-title').innerText = type;
        document.getElementById('fields').innerHTML = `<input type="text" id="i1" placeholder="بيانات...">`;
    }
    
    function goBack() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('section-page').style.display = 'none';
    }

    function saveData() {
        let val = document.getElementById('i1').value;
        let data = JSON.parse(localStorage.getItem(activeType) || "[]");
        data.push(val);
        localStorage.setItem(activeType, JSON.stringify(data));
        renderRecords();
    }

    function renderRecords() {
        let data = JSON.parse(localStorage.getItem(activeType) || "[]");
        document.getElementById('record-list').innerHTML = data.map(d => `<div class="card">${d}</div>`).join('');
    }
</script>
</body>
</html>
